# cargo-deny configuration — run `cargo deny check` (install: cargo install cargo-deny).
# Enforces that every dependency is under a permissive license compatible with
# this project's public-domain (Unlicense) release.

[licenses]
# Only these licenses are allowed anywhere in the dependency tree.
allow = [
    "Unlicense",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "allow"

[advisories]
# Warn (don't fail) on advisories so a fresh checkout still builds; tighten in CI.
yanked = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
